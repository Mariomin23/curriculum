<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mario Minuesa | Fullstack Developer</title>
    <!-- Aplica el tema guardado antes de pintar nada para evitar el flash de tema incorrecto -->
    <script>
        document.documentElement.setAttribute('data-bs-theme', localStorage.getItem('theme') || 'dark');
    </script>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%236366f1'/%3E%3Ctext x='50' y='72' font-size='62' font-weight='800' font-family='Inter,sans-serif' fill='white' text-anchor='middle'%3EM%3C/text%3E%3C/svg%3E">
    <meta name="description" content="Portfolio profesional de Mario Minuesa, Desarrollador Fullstack y Técnico en Sistemas Microinformáticos y Redes.">

    <!-- Open Graph / WhatsApp / redes sociales -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://mariominuesa.tripleeme.es/">
    <meta property="og:title" content="Mario Minuesa | Fullstack Developer">
    <meta property="og:description" content="Bienvenido a mi portfolio profesional — Mario Minuesa, Desarrollador Fullstack.">
    <meta property="og:image" content="https://mariominuesa.tripleeme.es/MarioCvdef1.jpg">
    <meta property="og:image:width" content="471">
    <meta property="og:image:height" content="628">
    <meta property="og:locale" content="es_ES">

    <!-- Twitter Card: "summary" (miniatura cuadrada) porque la foto es vertical
         y summary_large_image la recortaría mal; WhatsApp usa og:image directamente -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Mario Minuesa | Fullstack Developer">
    <meta name="twitter:description" content="Bienvenido a mi portfolio profesional — Mario Minuesa, Desarrollador Fullstack.">
    <meta name="twitter:image" content="https://mariominuesa.tripleeme.es/MarioCvdef1.jpg">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg border-bottom sticky-top bg-body">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">Mario Minuesa</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent"
                    aria-controls="navContent" aria-expanded="false" aria-label="Abrir menú">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navContent">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center gap-1">
                    <li class="nav-item"><a class="nav-link" href="/" data-route="/" data-i18n="nav_home">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="/proyectos" data-route="/proyectos" data-i18n="nav_projects">Proyectos</a></li>
                    <li class="nav-item"><a class="nav-link" href="/stack" data-route="/stack" data-i18n="nav_stack">Stack</a></li>
                    <li class="nav-item"><a class="nav-link" href="/sobre-mi" data-route="/sobre-mi" data-i18n="nav_about">Sobre mí</a></li>
                    <li class="nav-item"><a class="nav-link" href="/curriculum" data-route="/curriculum" data-i18n="nav_cv">CV</a></li>
                    <li class="nav-item"><a class="nav-link" href="/contacto" data-route="/contacto" data-i18n="nav_contact">Contacto</a></li>
                    <li class="nav-item ms-lg-2 d-flex align-items-center gap-2" id="navControls">
                        <button id="langToggle" class="btn btn-link nav-link p-0" title="Cambiar idioma" aria-label="Cambiar idioma">
                            <span id="langIcon">🇬🇧</span>
                        </button>
                        <button id="themeToggle" class="btn btn-link nav-link p-0" title="Cambiar tema" aria-label="Cambiar tema">
                            <i class="bi bi-sun-fill d-none" id="sunIcon"></i>
                            <i class="bi bi-moon-stars-fill" id="moonIcon"></i>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main id="app-root" class="container py-5">
        <!-- Rendered by router.js -->
    </main>

    <!-- WhatsApp Floating Button -->
    <a href="https://wa.me/34643917030" class="whatsapp-btn shadow" target="_blank" rel="noopener noreferrer"
       title="Enviar WhatsApp" aria-label="Contactar por WhatsApp">
        <i class="bi bi-whatsapp"></i>
    </a>

    <!-- Login Toast -->
    <div class="toast-container position-fixed bottom-0 start-50 translate-middle-x p-3">
        <div id="loginToast" class="toast align-items-center" role="alert" aria-atomic="true" data-bs-delay="3500">
            <div class="d-flex">
                <div class="toast-body">
                    <strong id="loginToastTitle"></strong><br>
                    <span id="loginToastBody"></span>
                </div>
                <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <!-- Login Modal -->
    <div class="modal fade" id="loginModal" tabindex="-1" aria-labelledby="loginModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content glass-card border-0 shadow-lg">
                <div class="modal-header border-bottom-0">
                    <h5 class="modal-title fw-bold" id="loginModalLabel"><i class="bi bi-shield-lock me-2"></i>Acceso Admin</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-semibold">Usuario</label>
                            <input type="text" class="form-control bg-body-tertiary border-0" id="loginUser" required autocomplete="username">
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted small fw-semibold">Contraseña</label>
                            <input type="password" class="form-control bg-body-tertiary border-0" id="loginPass" required autocomplete="current-password">
                        </div>
                        <button type="submit" class="btn btn-primary w-100 rounded-pill shadow-sm">Iniciar Sesión</button>
                    </form>
                    <div id="loginError" class="text-danger small mt-3 text-center d-none"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer py-3 border-top bg-body-tertiary">
        <div class="container d-flex justify-content-between align-items-center text-muted">
            <span class="small" data-i18n="footer_text">&copy; 2026 Mario Minuesa. Todo detalle cuenta.</span>
            <button id="loginBtn" class="btn btn-link btn-sm text-muted p-0 small text-decoration-none">
                <i class="bi bi-person-lock me-1"></i><span data-i18n="nav_login">Login</span>
            </button>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/translations.js"></script>
    <script src="js/router.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
